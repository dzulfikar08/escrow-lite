name = "escrow-lite"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Use assets directory for Astro build
[assets]
directory = "./dist"

[env.development]
name = "escrow-lite-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "escrow-lite-dev"
database_id = "e14aecb7-3188-49d3-b545-d7396e212d60"

[[env.development.r2_buckets]]
binding = "STORAGE"
bucket_name = "escrow-lite-dev-evidence"

[env.development.vars]
ENVIRONMENT = "development"

# Cron triggers for scheduled jobs
# Runs every 5 minutes to process:
# - Auto-release of timed-out transactions
# - Pending payout processing
[triggers]
crons = ["*/5 * * * *"]

[env.production]
name = "escrow-lite-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "escrow-lite-prod"
database_id = "aafa0168-3efe-43e2-aaf7-0ca27ac88a4c"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "escrow-lite-prod-evidence"

[env.production.vars]
ENVIRONMENT = "production"
