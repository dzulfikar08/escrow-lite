name = "escrow-lite"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-03-18"
compatibility_flags = ["nodejs_compat"]

# Observability
[observability]
enabled = true

# Cron triggers for scheduled jobs
[triggers]
crons = ["*/5 * * * *"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "escrow-lite-prod"
database_id = "aafa0168-3efe-43e2-aaf7-0ca27ac88a4c"

# R2 Storage
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "escrow-lite-prod-evidence"

# KV for sessions
[[kv_namespaces]]
binding = "SESSION"
id = "476992387f394eb5b82b504dfd9e049b"

[vars]
ENVIRONMENT = "production"
